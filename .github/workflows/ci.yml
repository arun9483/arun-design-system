# PR + main gate — thin consumer of frontend-platform-kit reusable workflows.
# Always pin to a tag (@v1), never @main. Library-only repo: no lighthouse/e2e;
# release publishing stays in release.yml (changesets).

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: arun9483/frontend-platform-kit/.github/workflows/quality.yml@v1
    secrets: inherit

  security:
    uses: arun9483/frontend-platform-kit/.github/workflows/security.yml@v1
